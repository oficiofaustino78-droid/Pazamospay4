
<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazamos Pay | Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');
        
        :root {
            --primary: #15803d;
            --header-bg: #15803d;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --border-color: #f1f5f9;
        }

        .theme-noturno {
            --bg-main: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --border-color: #334155;
            --header-bg: #000000;
        }
        .theme-noturno body { background-color: var(--bg-main); color: var(--text-main); }
        .theme-noturno .bg-white { background-color: var(--card-bg) !important; color: var(--text-main); }
        .theme-noturno .text-slate-900 { color: #ffffff !important; }
        .theme-noturno .text-slate-600 { color: #94a3b8 !important; }
        .theme-noturno .text-slate-400 { color: #64748b !important; }
        .theme-noturno .border { border-color: var(--border-color) !important; }
        .theme-noturno header { background-color: var(--header-bg) !important; }
        .theme-noturno .bg-slate-50 { background-color: #0f172a !important; }
        .theme-noturno .bg-slate-100 { background-color: #1e293b !important; }

        .theme-sol {
            --bg-main: #ffffff;
            --card-bg: #ffffff;
            --text-main: #000000;
            --border-color: #000000;
            --header-bg: #ffffff;
        }
        .theme-sol body { background-color: #ffffff; color: #000000; font-weight: 800; }
        .theme-sol header { background-color: #ffffff !important; border-bottom: 4px solid #000000 !important; }
        .theme-sol header * { color: #000000 !important; }
        .theme-sol .bg-white { background-color: #ffffff !important; border: 2px solid #000000 !important; color: #000000 !important; }
        .theme-sol .text-slate-900, .theme-sol .text-slate-600, .theme-sol .text-slate-400 { color: #000000 !important; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }
        
        .no-scroll {
            overflow: hidden !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .gold-shimmer-bg {
            background: linear-gradient(135deg, #d4af37 0%, #fef3c7 50%, #b45309 100%);
            position: relative;
            overflow: hidden;
        }

        input, select, textarea {
            color: #000000 !important;
            font-weight: 700 !important;
        }

        .font-pay-serif { font-family: 'Playfair Display', serif; }
        .font-pay-sans { font-family: 'Open Sans', sans-serif; }
    </style>
<script type="importmap">
{

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body id="pay-body">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <audio id="alarm-sound" preload="auto" loop>
        <source src="https://www.soundjay.com/buttons/beep-08b.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
